########################################
# KlipperScreen.conf — Snapmaker J1/J1s IDEX
# Optimized for Klipper dual carriage configuration
#
# Place in ~/printer_data/config/KlipperScreen.conf
# Restart KlipperScreen after modification
########################################

[main]
# Automatically close status screen 30s after print completion
job_complete_timeout: 30
job_error_timeout: 0

########################################
# CUSTOM PREHEATS
# Adapted for dual extruder — replace default profiles
########################################

[preheat PLA T0]
extruder: 210
heater_bed: 60

[preheat PLA T1]
extruder1: 210
heater_bed: 60

[preheat PETG T0]
extruder: 240
heater_bed: 80

[preheat PETG T1]
extruder1: 240
heater_bed: 80

[preheat ABS T0]
extruder: 260
heater_bed: 90

[preheat ABS T1]
extruder1: 260
heater_bed: 90

[preheat Cooldown]
extruder: 0
extruder1: 0
heater_bed: 0


########################################
