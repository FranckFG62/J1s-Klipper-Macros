###############################################################
# ADXL toggle — enable/disable via Klipper macros
#
# PREREQUISITE: gcode_shell_command extension must be installed:
#   ./kiauh/kiauh.sh → Extensions → gcode_shell_command
#
# SETUP (once, via SSH on the printer — make scripts executable):
#   chmod +x ~/printer_data/config/Extras/scripts/ADXL_enable.sh
#   chmod +x ~/printer_data/config/Extras/scripts/ADXL_disable.sh
#
# USAGE:
#   ADXL_ENABLE  → uncomments shaketune.cfg include, restarts Klipper
#   ADXL_DISABLE → comments it back out, restarts Klipper
###############################################################

[gcode_shell_command ADXL_enable_cmd]
command: bash /home/pi/printer_data/config/Extras/scripts/ADXL_enable.sh
timeout: 5
verbose: False

[gcode_shell_command ADXL_disable_cmd]
command: bash /home/pi/printer_data/config/Extras/scripts/ADXL_disable.sh
timeout: 5
verbose: False

[gcode_macro ADXL_ENABLE]
description: Enable ADXL — connect ADXL345 first, then run this macro
gcode:
    IMP_LOG MSG="ADXL — enabling (modifying printer.cfg)..."
    RUN_SHELL_COMMAND CMD=ADXL_enable_cmd
    G4 P1000
    IMP_LOG MSG="ADXL enabled — restarting Klipper..."
    FIRMWARE_RESTART

[gcode_macro ADXL_DISABLE]
description: Disable ADXL — safe to run after disconnecting ADXL345
gcode:
    IMP_LOG MSG="ADXL — disabling (modifying printer.cfg)..."
    RUN_SHELL_COMMAND CMD=ADXL_disable_cmd
    G4 P1000
    IMP_LOG MSG="ADXL disabled — restarting Klipper..."
    FIRMWARE_RESTART

###############################################################
# Input shaper
###############################################################

# Loads the input_shaper module (registers SET_INPUT_SHAPER / SHAPER_CALIBRATE).
# Must stay empty — parameters are forbidden with dual_carriage (applied dynamically below).
[input_shaper]

[delayed_gcode init_shaper]
initial_duration: 0.3
gcode:
    {% set v = printer.save_variables.variables %}
    {% set t0_type_x = v.shaper_t0_type_x|default('3hump_ei') %}
    {% set t0_freq_x = v.shaper_t0_freq_x|default(134.8)|float %}
    {% set t0_type_y = v.shaper_t0_type_y|default('3hump_ei') %}
    {% set t0_freq_y = v.shaper_t0_freq_y|default(89.6)|float %}
    {% set t1_type_x = v.shaper_t1_type_x|default(t0_type_x) %}
    {% set t1_freq_x = v.shaper_t1_freq_x|default(t0_freq_x)|float %}
    SET_DUAL_CARRIAGE CARRIAGE=0
    SET_INPUT_SHAPER SHAPER_TYPE_X={t0_type_x} SHAPER_FREQ_X={t0_freq_x} SHAPER_TYPE_Y={t0_type_y} SHAPER_FREQ_Y={t0_freq_y} damping_ratio_x=0.052 damping_ratio_y=0.052
    SET_DUAL_CARRIAGE CARRIAGE=1
    SET_INPUT_SHAPER SHAPER_TYPE_X={t1_type_x} SHAPER_FREQ_X={t1_freq_x} SHAPER_TYPE_Y={t0_type_y} SHAPER_FREQ_Y={t0_freq_y} damping_ratio_x=0.052 damping_ratio_y=0.052
    SET_DUAL_CARRIAGE CARRIAGE=0
    IMP_LOG MSG="Shaper loaded — T0: {t0_type_x}/{t0_freq_x}Hz  T1: {t1_type_x}/{t1_freq_x}Hz  Y: {t0_type_y}/{t0_freq_y}Hz"

