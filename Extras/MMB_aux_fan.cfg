#####################################################################
# MCU COOLING — Auxiliary fan (alternative to enclosure fan)
# Sensor: PA2 (EPCOS 100K NTC) — temperature displayed in Mainsail
# Fan:    PC6 → auxiliary fan, controlled manually via SET_FAN_SPEED
#
# ACTIVATION:
#   Copy this file to Extras/MCU_temp_fan.cfg
#   (replaces the enclosure fan variant)
#   Then restart Klipper (FIRMWARE_RESTART).
#
# USAGE:
#   SET_FAN_SPEED FAN=aux_fan SPEED=0.5   # 50 %
#   SET_FAN_SPEED FAN=aux_fan SPEED=1.0   # 100 %
#   SET_FAN_SPEED FAN=aux_fan SPEED=0     # off
#   Or use the AUX_FAN macro below for temperature-based control.
#####################################################################

# Auxiliary fan on mmb:gpio8
[fan_generic aux_fan]
pin: mmb:gpio8
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5


