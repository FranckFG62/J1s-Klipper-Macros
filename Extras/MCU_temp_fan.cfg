#####################################################################
# MCU COOLING — Enclosure fan (default)
# Sensor: PA2 (EPCOS 100K NTC)
# Fan:    PC6
#
# The fan is driven automatically by Klipper (watermark control)
# based on the MCU/enclosure temperature read on PA2.
# Target: 35 °C  — fan runs between 15 % and 100 % above that threshold.
#
# To switch to auxiliary fan mode, replace this file with
# Extras/MCU_aux_fan.cfg (copy it here as MCU_temp_fan.cfg).
#####################################################################

[temperature_fan MCU_Management]
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F

target_temp: 35.0
min_temp: 0
max_temp: 60

pin: PC6
control: watermark
max_delta: 3.0

max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
min_speed: 0.15
max_speed: 1.0
