###############################################################
# Input shaper tuning for J1s IDEX
# sudo apt install python3-numpy python3-matplotlib libopenblas-dev
# source ~/klippy-env/bin/activate
# pip install --upgrade pip setuptools wheel
# pip install "numpy>=2.0"
# deactivate
#
#
#
# ACTIVATION:
#   1. Connect the FYSETC ADXL345 USB module to the printer.
#   3. Uncomment in printer.cfg:
#        [include Extras/ADXL.cfg]
#   4. FIRMWARE_RESTART
#   5. Run SHAPER_CALIBRATE_T0 or SHAPER_CALIBRATE_T1 from the Mainsail console.
#
# DEACTIVATION (when ADXL not connected):
#   Comment out [include Extras/ADXL.cfg] in printer.cfg, then FIRMWARE_RESTART.
#
# WORKFLOW:
#   - Fix ADXL345 on T0, run SHAPER_CALIBRATE_T0
#   - Move ADXL345 to T1, run SHAPER_CALIBRATE_T1
###############################################################

# ADXL345 hardware (MCU + sensor + resonance_tester at bed centre 165,100)
[include adxl345_fysetc_v1.cfg]


###############################################################
# IDEX wrapper macros
# Parks the inactive carriage, activates the tested one,
# then runs SHAPER_CALIBRATE.
#
# (Y axis is shared — only saved from T0 calibration)
###############################################################

[gcode_macro SAVE_SHAPER_PARAMS]
description: Persist input shaper results to variables.cfg — run after SHAPER_CALIBRATE_T0 or SHAPER_CALIBRATE_T1
# After SHAPER_CALIBRATE_T0: SAVE_SHAPER_PARAMS CARRIAGE=0 SHAPER_TYPE_X=3hump_ei SHAPER_FREQ_X=134.8 SHAPER_TYPE_Y=3hump_ei SHAPER_FREQ_Y=89.6
# After SHAPER_CALIBRATE_T1: SAVE_SHAPER_PARAMS CARRIAGE=1 SHAPER_TYPE_X=3hump_ei SHAPER_FREQ_X=128.4
gcode:
    {% set c = params.CARRIAGE|default(0)|int %}
    {% set type_x = params.SHAPER_TYPE_X|default('')|lower %}
    {% set freq_x = params.SHAPER_FREQ_X|default(0)|float %}
    {% if type_x == '' or freq_x == 0 %}
        { action_raise_error("SAVE_SHAPER_PARAMS: SHAPER_TYPE_X and SHAPER_FREQ_X are required") }
    {% endif %}
    SAVE_VARIABLE VARIABLE=shaper_t{c}_type_x VALUE="'{type_x}'"
    SAVE_VARIABLE VARIABLE=shaper_t{c}_freq_x VALUE={freq_x}
    {% if params.SHAPER_TYPE_Y is defined and params.SHAPER_FREQ_Y is defined %}
        {% set type_y = params.SHAPER_TYPE_Y|default('')|lower %}
        {% set freq_y = params.SHAPER_FREQ_Y|default(0)|float %}
        {% if type_y != '' and freq_y != 0 %}
            SAVE_VARIABLE VARIABLE=shaper_t0_type_y VALUE="'{type_y}'"
            SAVE_VARIABLE VARIABLE=shaper_t0_freq_y VALUE={freq_y}
            IMP_LOG MSG="Shaper T{c} saved — X: {type_x}/{freq_x}Hz  Y (shared): {type_y}/{freq_y}Hz"
        {% else %}
            IMP_LOG MSG="Shaper T{c} saved — X: {type_x}/{freq_x}Hz (Y skipped — empty values)"
        {% endif %}
    {% else %}
        IMP_LOG MSG="Shaper T{c} saved — X: {type_x}/{freq_x}Hz"
    {% endif %}


[gcode_macro _SHAPER_AUTOSAVE]
description: Internal — reads SHAPER_CALIBRATE pending results from configfile and saves to variables.cfg
# Called as a separate macro so its template is rendered AFTER SHAPER_CALIBRATE has populated save_config_pending_items
gcode:
    {% set c = params.CARRIAGE|default(0)|int %}
    {% set pending = printer.configfile.save_config_pending_items %}
    {% if pending.input_shaper is not defined %}
        { action_raise_error("_SHAPER_AUTOSAVE: no pending input_shaper values — did SHAPER_CALIBRATE run?") }
    {% endif %}
    {% set sh = pending.input_shaper %}
    {% set type_x = sh.shaper_type_x %}
    {% set freq_x = sh.shaper_freq_x|float %}
    {% if c == 0 %}
        {% set type_y = sh.shaper_type_y %}
        {% set freq_y = sh.shaper_freq_y|float %}
        SAVE_SHAPER_PARAMS CARRIAGE=0 SHAPER_TYPE_X={type_x} SHAPER_FREQ_X={freq_x} SHAPER_TYPE_Y={type_y} SHAPER_FREQ_Y={freq_y}
    {% else %}
        SAVE_SHAPER_PARAMS CARRIAGE=1 SHAPER_TYPE_X={type_x} SHAPER_FREQ_X={freq_x}
    {% endif %}


[gcode_macro SHAPER_CALIBRATE_T0]
description: Input shaper calibration on T0 (left carriage) — fix ADXL345 on T0 first
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        IMP_LOG MSG="SHAPER_CALIBRATE T0 — homing first..."
        G28
    {% endif %}

    IMP_LOG MSG="SHAPER_CALIBRATE T0 — parking T1 to the right..."
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G90
    G1.1 X{printer.configfile.settings.dual_carriage.position_max} F12000
    M400

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro _Z_OFFSET"].t0}
    G92 E0

    IMP_LOG MSG="SHAPER_CALIBRATE T0 — running (probe point 165,100)..."
    SHAPER_CALIBRATE
    _SHAPER_AUTOSAVE CARRIAGE=0
    G28 X Y
    BLINK_LED COUNT=5 ON_MS=300 OFF_MS=200


[gcode_macro SHAPER_CALIBRATE_T1]
description: Input shaper calibration on T1 (right carriage) — fix ADXL345 on T1 first
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        IMP_LOG MSG="SHAPER_CALIBRATE T1 — homing first..."
        G28
    {% endif %}

    IMP_LOG MSG="SHAPER_CALIBRATE T1 — parking T0 to the left..."
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G90
    G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
    M400

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro _Z_OFFSET"].t1}
    G92 E0

    IMP_LOG MSG="SHAPER_CALIBRATE T1 — running X axis only (probe point 165,100)..."
    SHAPER_CALIBRATE AXIS=X
    _SHAPER_AUTOSAVE CARRIAGE=1
    G28 X Y
    BLINK_LED COUNT=5 ON_MS=300 OFF_MS=200
