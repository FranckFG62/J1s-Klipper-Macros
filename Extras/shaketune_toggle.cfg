###############################################################
# ShakeTune toggle — enable/disable via Klipper macros
#
# PREREQUISITE: gcode_shell_command extension must be installed:
#   ./kiauh/kiauh.sh → Extensions → gcode_shell_command
#
# SETUP (once, via SSH on the printer — make scripts executable):
#   chmod +x ~/printer_data/config/Extras/scripts/shaketune_enable.sh
#   chmod +x ~/printer_data/config/Extras/scripts/shaketune_disable.sh
#
# USAGE:
#   SHAKETUNE_ENABLE  → uncomments shaketune.cfg include, restarts Klipper
#   SHAKETUNE_DISABLE → comments it back out, restarts Klipper
###############################################################

[gcode_shell_command shaketune_enable_cmd]
command: bash ~/printer_data/config/Extras/scripts/shaketune_enable.sh
timeout: 5
verbose: False

[gcode_shell_command shaketune_disable_cmd]
command: bash ~/printer_data/config/Extras/scripts/shaketune_disable.sh
timeout: 5
verbose: False

[gcode_macro SHAKETUNE_ENABLE]
description: Enable ShakeTune — connect ADXL345 first, then run this macro
gcode:
    IMP_LOG MSG="ShakeTune — enabling (modifying printer.cfg)..."
    RUN_SHELL_COMMAND CMD=shaketune_enable_cmd
    G4 P1000
    IMP_LOG MSG="ShakeTune enabled — restarting Klipper..."
    FIRMWARE_RESTART

[gcode_macro SHAKETUNE_DISABLE]
description: Disable ShakeTune — safe to run after disconnecting ADXL345
gcode:
    IMP_LOG MSG="ShakeTune — disabling (modifying printer.cfg)..."
    RUN_SHELL_COMMAND CMD=shaketune_disable_cmd
    G4 P1000
    IMP_LOG MSG="ShakeTune disabled — restarting Klipper..."
    FIRMWARE_RESTART
