#####################################################################
# BTT MMB Cubic V1.0 — Secondary MCU (RP2040 via USB)
#
# ACTIVATION:
#   Uncomment the include line in printer.cfg:
#     [include Extras/MMB_cubic.cfg]
#   Connect the MMB Cubic via USB-C, then restart Klipper.
#
# SERIAL ID:
#   The serial ID below is chip-specific and will remain constant
#   regardless of which USB port is used.
#   To verify: ls /dev/serial/by-id/usb-Klipper_rp2040_*
#
# POWER:
#   24V DCIN is required on the board's power connector for fan
#   outputs to operate. USB alone only powers the MCU logic.
#
# FAN OUTPUTS (PWM, voltage set by jumper per port):
#   FAN0 → IO8    FAN1 → IO7    FAN2 → IO6
#
# THERMISTOR INPUTS:
#   TH0 → IO26    TH1 → IO27    TH2 → IO28
#   Pull-up: 4.7k to 3.3V (standard NTC100K compatible)
#
# USAGE:
#   SET_FAN_SPEED FAN=mmb_fan0 SPEED=<0.0-1.0>
#   SET_FAN_SPEED FAN=mmb_fan1 SPEED=<0.0-1.0>
#   SET_FAN_SPEED FAN=mmb_fan2 SPEED=<0.0-1.0>
#   MMB_FAN SPEED=<0-100>   → controls fan0 as a percentage
#####################################################################

[mcu mmb]
serial: /dev/serial/by-id/usb-Klipper_rp2040_5044340310ABD01C-if00

[temperature_sensor MMB_MCU]
sensor_type: temperature_mcu
sensor_mcu: mmb

########################################
# FAN OUTPUTS
# Voltage per port: select 5V / 12V / 24V via jumper on the board
########################################

# use aux_fan
#[fan_generic mmb_fan0]
#pin: mmb:gpio8
#cycle_time: 0.01

[fan_generic mmb_fan1]
pin: mmb:gpio7
cycle_time: 0.01

[fan_generic mmb_fan2]
pin: mmb:gpio6
cycle_time: 0.01

########################################
# THERMISTOR INPUTS (optional)
# Uncomment if you have NTC100K thermistors connected to TH0/TH1/TH2.
# Adjust sensor_type to match your thermistor model.
########################################

#[temperature_sensor mmb_th0]
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: mmb:gpio26
#min_temp: 0
#max_temp: 80

#[temperature_sensor mmb_th1]
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: mmb:gpio27
#min_temp: 0
#max_temp: 80

#[temperature_sensor mmb_th2]
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: mmb:gpio28
#min_temp: 0
#max_temp: 80

########################################
# CONVENIENCE MACRO
########################################

[gcode_macro MMB_FAN]
description: Set MMB fan0 speed (SPEED=0-100)
gcode:
    {% set s = params.SPEED | default(0) | int %}
    SET_FAN_SPEED FAN=mmb_fan0 SPEED={ s / 100.0 }
