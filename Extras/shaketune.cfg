###############################################################
# ShakeTune — Input shaper tuning for J1s IDEX
#
# ACTIVATION:
#   1. Install ShakeTune on the printer (once):
#        wget -O - https://raw.githubusercontent.com/Frix-x/klippain-shaketune/main/install.sh | bash
#   2. Connect the FYSETC ADXL345 USB module to the printer.
#   3. Uncomment in printer.cfg:
#        [include Extras/shaketune.cfg]
#   4. FIRMWARE_RESTART
#   5. Run SHAKETUNE_T0 or SHAKETUNE_T1 from the Mainsail console.
#
# DEACTIVATION (when ADXL not connected):
#   Comment out [include Extras/shaketune.cfg] in printer.cfg, then FIRMWARE_RESTART.
#
# WORKFLOW:
#   - Fix ADXL345 on T0, run SHAKETUNE_T0
#   - Move ADXL345 to T1, run SHAKETUNE_T1
#   - Results are saved in ~/printer_data/config/ShakeTune_results/
#   - Apply recommended filters in printer.cfg [input_shaper] section
###############################################################

# ADXL345 hardware (MCU + sensor + resonance_tester at bed centre 165,100)
[include Extras/adxl345_fysetc_v1.cfg]

###############################################################
# ShakeTune plugin
###############################################################

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 3
keep_raw_data: False
show_macros_in_webui: True
timeout: 600

###############################################################
# IDEX wrapper macros
# Parks the inactive carriage, activates the tested one,
# then runs the full ShakeTune calibration sequence.
###############################################################

[gcode_macro SHAKETUNE_T0]
description: ShakeTune input shaper calibration on T0 (left carriage) — fix ADXL345 on T0 first
gcode:
    # Home if needed
    {% if "xyz" not in printer.toolhead.homed_axes %}
        IMP_LOG MSG="ShakeTune T0 — homing first..."
        G28
    {% endif %}

    IMP_LOG MSG="ShakeTune T0 — parking T1 to the right..."
    # Park T1 at right edge (offset=0, safe move)
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G90
    G1.1 X{printer.configfile.settings.dual_carriage.position_max} F12000
    M400

    # Activate T0 with correct Z offset
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro _Z_OFFSET"].t0}
    G92 E0

    IMP_LOG MSG="ShakeTune T0 — starting calibration (probe point X=165 Y=100)..."
    AXES_SHAPER_CALIBRATION

    IMP_LOG MSG="ShakeTune T0 done — results in ShakeTune_results/"
    BLINK_LED COUNT=5 ON_MS=300 OFF_MS=200


[gcode_macro SHAKETUNE_T1]
description: ShakeTune input shaper calibration on T1 (right carriage) — fix ADXL345 on T1 first
gcode:
    # Home if needed
    {% if "xyz" not in printer.toolhead.homed_axes %}
        IMP_LOG MSG="ShakeTune T1 — homing first..."
        G28
    {% endif %}

    IMP_LOG MSG="ShakeTune T1 — parking T0 to the left..."
    # Park T0 at left edge (offset=0, safe move)
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G90
    G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
    M400

    # Activate T1 with correct XYZ offsets
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro _Z_OFFSET"].t1}
    G92 E0

    IMP_LOG MSG="ShakeTune T1 — starting calibration (probe point X=165 Y=100)..."
    AXES_SHAPER_CALIBRATION

    IMP_LOG MSG="ShakeTune T1 done — results in ShakeTune_results/"
    BLINK_LED COUNT=5 ON_MS=300 OFF_MS=200
