#####################################################################
# FYSETC Portable Input Shaper v1 — ADXL345 via USB RP2040
#
# ACTIVATION:
#   Uncomment the include line in printer.cfg:
#     [include Extras/adxl345_fysetc_v1.cfg]
#   Plug in the USB module, then restart Klipper (FIRMWARE_RESTART).
#
#   
#
# USAGE (Mainsail console):
#   ACCELEROMETER_QUERY          → verify the sensor responds
#   SHAPER_CALIBRATE AXIS=X      → measure and calibrate X axis (T0)
#   SHAPER_CALIBRATE AXIS=Y      → measure and calibrate Y axis
#   SAVE_CONFIG                  → save results to printer.cfg
#
# To calibrate T1 (right carriage):
#   Move the ADXL module to T1, then re-run SHAPER_CALIBRATE AXIS=X
#
# DEACTIVATION:
#   Comment out the include line in printer.cfg and unplug the USB module.
#####################################################################

[mcu adxl]
serial: /dev/serial/by-id/usb-Klipper_rp2040_E66160F4236A8F37-if00

[adxl345]
cs_pin: adxl:gpio9
spi_bus: spi1a

[resonance_tester]
accel_chip: adxl345
# J1s bed centre (330x200)
probe_points: 165, 100, 20
