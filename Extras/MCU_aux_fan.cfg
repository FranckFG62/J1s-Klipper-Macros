#####################################################################
# MCU COOLING — Auxiliary fan (alternative to enclosure fan)
# Sensor: PA2 (EPCOS 100K NTC) — temperature displayed in Mainsail
# Fan:    PC6 → auxiliary fan, controlled manually via SET_FAN_SPEED
#
# ACTIVATION:
#   Copy this file to Extras/MCU_temp_fan.cfg
#   (replaces the enclosure fan variant)
#   Then restart Klipper (FIRMWARE_RESTART).
#
# USAGE:
#   SET_FAN_SPEED FAN=aux_fan SPEED=0.5   # 50 %
#   SET_FAN_SPEED FAN=aux_fan SPEED=1.0   # 100 %
#   SET_FAN_SPEED FAN=aux_fan SPEED=0     # off
#   Or use the AUX_FAN macro below for temperature-based control.
#####################################################################

# MCU/enclosure temperature — read-only, displayed in Mainsail
[temperature_sensor MCU_temp]
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 60

# Auxiliary fan on PC6 — manually controlled
[fan_generic aux_fan]
pin: PC6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 0.5

#####################################################################
# Optional macro: temperature-based aux fan control
# Call AUX_FAN_UPDATE from a [delayed_gcode] loop if you want
# automatic speed adjustment based on MCU temperature.
#####################################################################

[gcode_macro AUX_FAN]
description: Set auxiliary fan speed (SPEED=0.0-1.0)
gcode:
    {% set speed = params.SPEED|default(0.5)|float %}
    SET_FAN_SPEED FAN=aux_fan SPEED={speed}
    IMP_LOG MSG="Aux fan set to {(speed * 100)|int}%"
