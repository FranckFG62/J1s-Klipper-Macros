########################################
# IDEX — COPY / MIRROR / PRIMARY MODES
########################################

[gcode_macro IDEX_COPY]
description: Activate COPY mode — both heads print the same part side by side
gcode:
    {% set spacing = params.SPACING|default(165)|float %}
    {% set x_min   = printer.configfile.settings.stepper_x.position_min %}

    # IMPORTANT: do not use ACTIVATE_EXTRUDER during positioning
    # nor after COPY activation — this breaks carriage synchronization
    # SET_DUAL_CARRIAGE alone is enough to route moves to the correct stepper

    # Step 1: clean decouple
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Step 2: T0 to X_min (reference position)
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G90
    G1.1 X{x_min} F6000

    # Step 3: T1 to X_min + spacing
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_min + spacing} F6000

    # Step 4: set C0 back as active carriage BEFORE activating COPY on C1
    # Klipper raises "Must activate another carriage as PRIMARY first" if trying
    # to switch to COPY/MIRROR a carriage that is itself the active PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    # Step 5: activate COPY — computed offset = spacing
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    # Step 6: apply Z offset AFTER COPY activation
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    IMP_LOG MSG="COPY mode active — spacing={spacing}mm"

[gcode_macro IDEX_MIRROR]
description: Activate MIRROR mode — both heads print symmetrically about the bed center
gcode:
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    # Symmetry axis = bed center
    # T0 starts from X_min, T1 starts from X_max
    # When T0 moves +N, T1 moves -N → perfect symmetry

    # Step 1: clean decouple without ACTIVATE_EXTRUDER
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Step 2: T0 to X_min (left start position)
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G90
    G1.1 X{x_min} F6000

    # Step 3: T1 to X_max (right start position)
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_max} F6000

    # Step 4: set C0 back as active carriage BEFORE activating MIRROR on C1
    # Klipper raises "Must activate another carriage as PRIMARY first" if trying
    # to switch to COPY/MIRROR a carriage that is itself the active PRIMARY
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY

    # Step 5: activate MIRROR — T1 moves in opposite direction to T0
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    # Step 6: apply Z offset after activation
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    IMP_LOG MSG="MIRROR mode active — T0=X{x_min} T1=X{x_max} axis={((x_max - x_min) / 2)|round(1)}mm"

[gcode_macro IDEX_PRIMARY]
description: Return to PRIMARY mode — normal printing with T0
gcode:
    _IDEX_DECOUPLE
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G92 E0
    IMP_LOG MSG="PRIMARY mode active"

########################################
# IDEX — BACKUP MODE
# Automatically switches to backup extruder on filament runout
########################################

[gcode_macro _BACKUP_STATE]
variable_enabled:  0
variable_primary:  'extruder'
variable_backup:   'extruder1'
variable_switched: 0
gcode:
    # no-op — state storage only

[gcode_macro IDEX_BACKUP]
description: Enable backup mode — BACKUP=0|1 sets which head is the backup (default T1 backs up T0)
gcode:
    {% set backup_idx = params.BACKUP|default(1)|int %}
    {% set primary_name = 'extruder'  if backup_idx == 1 else 'extruder1' %}
    {% set backup_name  = 'extruder1' if backup_idx == 1 else 'extruder' %}
    {% set primary_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp
                          if primary_name == 'extruder'
                          else printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}

    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=enabled  VALUE=1
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=primary  VALUE='"{primary_name}"'
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=backup   VALUE='"{backup_name}"'
    SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=switched VALUE=0

    # Drop backup to standby (primary_temp - 70) to limit ooze while waiting
    # _J1_RUNTIME_STATE keeps full temp so switch heats back up correctly on runout
    {% set standby_temp = [primary_temp - 70, 0]|max %}
    {% if backup_name == 'extruder1' %}
        M104.1 S{standby_temp} T1
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={primary_temp}
    {% else %}
        M104.1 S{standby_temp} T0
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={primary_temp}
    {% endif %}

    IMP_LOG MSG="BACKUP mode enabled — primary={primary_name} backup={backup_name} standby={standby_temp}°C (full={primary_temp}°C)"

[gcode_macro _BACKUP_SWITCH]
description: Internal — switch to backup extruder after primary filament runout
gcode:
    {% set state = printer["gcode_macro _BACKUP_STATE"] %}

    {% if state.switched == 0 %}
        SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=switched VALUE=1
        IMP_LOG MSG="BACKUP: filament runout on {state.primary} — switching to {state.backup}"

        # Save print Z before any moves (wipe goes to Z=5)
        {% set save_z = printer.gcode_move.gcode_position.z %}

        # Switch carriage FIRST — parks primary, activates backup carriage
        {% if state.backup == 'extruder1' %}
            T1
        {% else %}
            T0
        {% endif %}

        # Turn off primary extruder (no longer printing)
        {% if state.primary == 'extruder' %}
            M104 S0 T0
        {% else %}
            M104 S0 T1
        {% endif %}


        # Return to print Z and restore safe feedrate
        G90
        G1.1 Z{save_z} F600
        G1.1 F6000

        # Re-arm filament sensor on new extruder
        SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=0
        FILAMENT_RESET_COUNTERS
        SET_GCODE_VARIABLE MACRO=_BACKUP_STATE VARIABLE=enabled VALUE=0

        IMP_LOG MSG="BACKUP: printing with {state.backup} at Z={save_z} — sensor re-armed"

    {% else %}
        # Second runout — no more backup available
        IMP_LOG MSG="BACKUP: runout on backup extruder too — pausing"
        PAUSE
    {% endif %}

########################################
# IDEX — INTERNAL MACROS
########################################

[gcode_macro _IDEX_DECOUPLE]
description: Decouple both carriages to independent PRIMARY mode
gcode:
    DBG_LOG MSG="IDEX decoupling"
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder  MOTION_QUEUE=extruder
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    # End on currently active carriage to not change move context
    {% if printer.toolhead.extruder == 'extruder' %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    {% endif %}

[gcode_macro _SWITCH_TO_EXTRUDER]
description: Internal extruder switch macro (used by T0/T1)
gcode:
    {% set name = params.NAME %}
    {% set is_t0 = (name == 'extruder') %}
    {% set autopark = params.AUTOPARK|default(1)|int %}
    {% set current = printer.toolhead.extruder %}

    # GUARD: if requested extruder is already active AND print
    # is in progress (_HOMED.ready=1), ignore switch to avoid
    # re-applying Z offsets (case of T0 injected by Orca after START_PRINT)
    {% if current == name and printer["gcode_macro _HOMED"].ready == 1 %}
        DBG_LOG MSG="Switch ignored — {name} already active — mode={printer.dual_carriage.carriage_1} offset_x={printer.gcode_move.homing_origin.x} offset_z={printer.gcode_move.homing_origin.z}"
        # Reset E to neutralize any E offset accumulated by Orca
        G92 E0
    {% else %}
        # Save IDEX mode BEFORE decoupling (needed for step 3)
        # FIX: after _IDEX_DECOUPLE, printer.dual_carriage.mode is always PRIMARY
        {% set idex_mode = printer.dual_carriage.carriage_1 %}

        # STEP 1: Park SOURCE carriage first, BEFORE decoupling
        # Move context is still coherent at this stage
        {% if autopark == 1 and 'z' in printer.toolhead.homed_axes %}
            {% if 'x' not in printer.toolhead.homed_axes %}
                G28 X
            {% endif %}
            G90
            {% if current == 'extruder' %}
                G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
                DBG_LOG MSG="Park source T0 → X={printer.configfile.settings.stepper_x.position_min}"
            {% else %}
                {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x %}
                G1.1 X{printer.configfile.settings.dual_carriage.position_max - t1_x_off} F12000
                DBG_LOG MSG="Park source T1 → X={printer.configfile.settings.dual_carriage.position_max - t1_x_off}"
            {% endif %}
        {% elif autopark == 1 %}
            DBG_LOG MSG="Park skipped — Z not homed"
        {% endif %}

        # STEP 2: IDEX decouple
        _IDEX_DECOUPLE

        # STEP 3: Apply target offsets
        # In COPY/MIRROR mode, T1 uses same Z offset as T0
        # to ensure both heads are at the same level
        {% if is_t0 %}
            SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        {% elif idex_mode in ['COPY', 'MIRROR'] %}
            SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
            DBG_LOG MSG="Mode {idex_mode} — T0 Z offset applied to T1"
        {% else %}
            SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        {% endif %}

        # STEP 4: Activate target extruder and carriage
        ACTIVATE_EXTRUDER EXTRUDER={name}
        SET_DUAL_CARRIAGE CARRIAGE={0 if is_t0 else 1} MODE=PRIMARY

        # STEP 5: Reset E to avoid injecting activated extruder E position
        # as gcode offset in Klipper
        G92 E0

        # STEP 6: Wait for temperature if needed
        {% set target_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp if is_t0 else printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}
        {% if target_temp > 0 %}
            M109.1 S{target_temp}
        {% endif %}

        # STEP 7: Force safe feedrate (50mm/s) before handing back to slicer gcode
        # avoids violent moves from park position with inherited F from print (e.g. F18000)
        G1.1 F3000

        DBG_LOG MSG="Switch OK — active={name}"
    {% endif %}

########################################
# RUNTIME STATE
# Stores temperatures and fans to retrieve them on T0/T1 switches
########################################

[gcode_macro _J1_RUNTIME_STATE]
variable_left_part_fan: 0
variable_right_part_fan: 0
variable_left_temp: -1
variable_right_temp: -1
gcode:
    # no-op

[gcode_macro RESET_RUNTIME_STATE]
description: Reset runtime state (fans, stored temperatures)
gcode:
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE=0
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp      VALUE=-1
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp     VALUE=-1
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0

########################################
# T0 / T1
########################################

[gcode_macro T0]
description: Activate left extruder (T0)
gcode:
    _SWITCH_TO_EXTRUDER NAME=extruder AUTOPARK={params.AUTOPARK|default(1)|int}

[gcode_macro T1]
description: Activate right extruder (T1)
gcode:
    _SWITCH_TO_EXTRUDER NAME=extruder1 AUTOPARK={params.AUTOPARK|default(1)|int}

########################################
# M104 / M109 / M106 / M107 OVERRIDES
########################################

[gcode_macro M104]
rename_existing: M104.1
description: M104 override with temperature storage in _J1_RUNTIME_STATE
gcode:
    {% set s = params.S|default(0)|float %}
    {% set t = params.T|int if params.T is defined else (1 if printer.toolhead.extruder == 'extruder1' else 0) %}
    {% if t == 0 %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
    {% endif %}
    M104.1 S{s} T{t}

[gcode_macro M109]
rename_existing: M109.1
description: M109 override with temperature storage in _J1_RUNTIME_STATE
gcode:
    {% set s = params.S|default(0)|float %}
    {% set t = params.T|int if params.T is defined else (1 if printer.toolhead.extruder == 'extruder1' else 0) %}
    {% if t == 0 %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={s}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={s}
    {% endif %}
    M109.1 S{s} T{t}


[gcode_macro M106]
description: Manage fans accounting for IDEX modes and auxiliary fan (P2)
gcode:
    {% set p        = params.P|default(0)|int %}
    {% set fan_speed = params.S|default(255)|float / 255.0 %}

    {% if p == 2 %}
        # AUXILIARY FAN (P2) — independent of IDEX mode
        SET_FAN_SPEED FAN=auxiliary_fan SPEED={fan_speed}
        DBG_LOG MSG="M106 P2: auxiliary → {fan_speed}"

    {% else %}
        # PART COOLING FANS (P0 / no P)
        {% set idex_mode = printer.dual_carriage.carriage_1 %}
        {% if idex_mode in ['COPY', 'MIRROR'] %}
            # SYNC MODE: both fans at same speed
            SET_FAN_SPEED FAN=left_part_fan  SPEED={fan_speed}
            SET_FAN_SPEED FAN=right_part_fan SPEED={fan_speed}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE={fan_speed}
            SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE={fan_speed}
            DBG_LOG MSG="M106: Mode {idex_mode} — dual fan → {fan_speed}"
        {% else %}
            # PRIMARY MODE — 2 heads if both hotends have a target temperature
            {% set l_temp = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp %}
            {% set r_temp = printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}
            {% if l_temp > 0 and r_temp > 0 %}
                # 2 heads: both fans at same speed
                # (slicer sends single M106 — both sides must be cooled)
                SET_FAN_SPEED FAN=left_part_fan  SPEED={fan_speed}
                SET_FAN_SPEED FAN=right_part_fan SPEED={fan_speed}
                SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_part_fan  VALUE={fan_speed}
                SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_part_fan VALUE={fan_speed}
                DBG_LOG MSG="M106: 2 heads PRIMARY — dual fan → {fan_speed}"
            {% else %}
                # 1 head: only active head fan
                {% set fan = 'left_part_fan' if printer.toolhead.extruder == 'extruder' else 'right_part_fan' %}
                SET_FAN_SPEED FAN={fan} SPEED={fan_speed}
                SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE={fan} VALUE={fan_speed}
                DBG_LOG MSG="M106: 1 head PRIMARY — {fan} → {fan_speed}"
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro M107]
description: M107 override — turn off active layer fan
gcode:
    {% if params.P is defined %}
        M106 P{params.P} S0
    {% else %}
        M106 S0
    {% endif %}
