

########################################
# LOGGING
########################################

[gcode_macro DBG_LOG]
gcode:
    RESPOND PREFIX="-- " MSG="{params.MSG}"

[gcode_macro IMP_LOG]
gcode:
    RESPOND PREFIX="!! " MSG="{params.MSG}"

########################################
# HOMING FLAG
# Used to ignore G1 Z moves injected by Orca before homing is done
########################################

[gcode_macro _HOMED]
variable_ready: 0
gcode:
    # no-op

########################################
# G1 OVERRIDE
# Blocks Z moves if homing has not been performed yet
########################################

[gcode_macro G1]
rename_existing: G1.1
gcode:
    # Block Z moves only when _HOMED.ready=0 AND Z axis is not yet homed.
    # This avoids blocking manual jog from Mainsail after a homing sequence
    # done outside of a print start (e.g. manual G28).
    {% if params.Z is defined
          and printer["gcode_macro _HOMED"].ready == 0
          and "z" not in printer.toolhead.homed_axes %}
        DBG_LOG MSG="G1 Z blocked — homing not done"
    {% else %}
        G1.1 {rawparams}
    {% endif %}



########################################
# NOZZLE WIPE — DURING HEATING
########################################

[gcode_macro _WIPE_NOZZLE]
description: 3 back-and-forth wipes on the silicone parking pad — called during heating
# T=0|1 — head to clean (default: active head)
# Leaves head 10mm from pad, at Z=5
gcode:
    {% set t = params.T|default(-1)|int %}
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}
    # Compute pad position accounting for active X offset
    # (0 for T0, right_nozzle_adjust_x for T1 in print mode)
    {% set x_off = printer.gcode_move.homing_origin.x %}
    {% if t == 0 %}
        {% set pad_x  = printer.configfile.settings.stepper_x.position_min|float %}
        {% set wipe_x = pad_x + 10 %}
    {% else %}
        {% set pad_x  = printer.configfile.settings.dual_carriage.position_max|float - x_off %}
        {% set wipe_x = pad_x - 10 %}
    {% endif %}
    DBG_LOG MSG="Wipe T{t} — pad_x={pad_x} wipe_x={wipe_x}"
    G90
    G1.1 Z5 F600
    G1.1 X{wipe_x} Y5 F12000
    G1.1 Z0.3 F600
    {% for i in range(3) %}
        G1.1 X{pad_x}  F3000
        G1.1 X{wipe_x} F3000
    {% endfor %}
    G1.1 Z5 F600

[gcode_macro DEBUG_EXTRUDER]
gcode:
  {% set gce = printer.gcode_move.gcode_position.e %}
  {action_respond_info("gcode_position.e: %.2f" % gce)}


