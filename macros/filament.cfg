########################################
# FILAMENT LOAD / UNLOAD — J1s
#
# Usage:
#   LOAD_FILAMENT                     → load active T0 at 230°C (default)
#   LOAD_FILAMENT   TEMP=220 T=1      → load T1 at 220°C
#   UNLOAD_FILAMENT                   → unload active T0 at 230°C (default)
#   UNLOAD_FILAMENT TEMP=220 T=1      → unload T1 at 220°C
#
# Overridable parameters:
#   T=0|1          → target extruder (default: active)
#   TEMP=xxx       → temperature in °C (default: 230)
#   LENGTH=xxx     → load length in mm (default: 60)
#   UNLOAD_LEN=xxx → unload length in mm (default: 80)
#   PURGE=xxx      → final purge length in mm (default: 30)
#
# Default lengths calibrated for J1s (direct drive):
#   60mm  load   — from sensor to nozzle
#   80mm  unload — nozzle + clean clearance out of hotend
#   30mm  final purge — flushes old filament after loading
########################################


########################################
# INTERNAL MACRO — selects and prepares the correct extruder
########################################

[gcode_macro _FILAMENT_SELECT_EXTRUDER]
description: Select and activate target extruder for load/unload
gcode:
    {% set t = params.T|default(-1)|int %}

    # If T not specified, use active extruder
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}

    DBG_LOG MSG="Selecting extruder T{t} for filament"

    # Home only if not yet homed and not currently printing
    {% if 'xyz' not in printer.toolhead.homed_axes and printer.print_stats.state != "printing" %}
        IMP_LOG MSG="Homing required before filament load"
        G28
        G90
    {% endif %}

    # Move to Z30 only during active print (clear the object)
    {% if printer.print_stats.state == "printing" %}
        G1.1 Z30 F600
    {% endif %}

    # Clean decoupling
    _IDEX_DECOUPLE

    {% if t == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G90
        G1.1 X{printer.configfile.settings.stepper_x.position_min|float + 10} F3000
    {% else %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G90
        G1.1 X{printer.configfile.settings.dual_carriage.position_max|float - 10} F3000
    {% endif %}
    G92 E0


########################################
# FILAMENT LOAD
########################################

[gcode_macro _LOAD_FILAMENT]
description: Load filament into T0 or T1 with final purge.
# Usage: LOAD_FILAMENT [TEMP=230] [T=0|1] [LENGTH=60] [PURGE=30]
gcode:
    {% set temp       = params.TEMP|default(230)|float %}
    {% set t          = params.T|default(-1)|int %}
    {% set length     = params.LENGTH|default(60)|float %}
    {% set purge      = params.PURGE|default(30)|float %}
    {% set load_speed = 8 * 60 %}   # 8mm/s — slow load to prevent jam
    {% set purge_speed = 5 * 60 %}   # 5mm/s — slow purge for clean extrusion

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}
    {% set heater = 'extruder' if t == 0 else 'extruder1' %}

    IMP_LOG MSG="LOAD_FILAMENT T{t} — heating to {temp}°C"

    # Select and prepare extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    G90

    # Heat, wait, then clean at temperature
    M109.1 S{temp} T{t}
    G4 S20
    IMP_LOG MSG="T{t} at temperature — cleaning nozzle..."
    IMP_LOG MSG="T{t} ready — inserting filament"

    # Phase 1: fast load to hotend
    M83
    G92 E0
    G1.1 E{length} F{load_speed}
    M400

    # Phase 2: final purge — flushes old filament
    IMP_LOG MSG="Final purge {purge}mm"
    G1.1 E{purge} F{purge_speed}
    M400

    # Light retract to prevent ooze
    G1.1 E-2 F300
    M400
    G92 E0

    # Cool slightly to stop oozing
    _WIPE_NOZZLE T={t}
    M104.1 S{temp - 30} T{t}

    IMP_LOG MSG="LOAD T{t} done — {length + purge}mm extruded"


########################################
# FILAMENT UNLOAD
########################################

[gcode_macro _UNLOAD_FILAMENT]
description: Unload filament from T0 or T1.
# Usage: UNLOAD_FILAMENT [TEMP=230] [T=0|1] [UNLOAD_LEN=80]
gcode:
    {% set temp         = params.TEMP|default(230)|float %}
    {% set t            = params.T|default(-1)|int %}
    {% set unload_len   = params.UNLOAD_LEN|default(80)|float %}
    {% set purge_before = 10 %}      # small purge before pulling — prevents jam
    {% set purge_speed  = 5 * 60 %}  # 5mm/s
    {% set retract_slow = 5 * 60 %}  # 5mm/s — slow retract start
    {% set retract_fast = 15 * 60 %} # 60mm/s — fast extraction out of hotend

    # Resolve actual extruder number
    {% if t == -1 %}
        {% set t = 0 if printer.toolhead.extruder == 'extruder' else 1 %}
    {% endif %}
    {% set heater = 'extruder' if t == 0 else 'extruder1' %}

    IMP_LOG MSG="UNLOAD_FILAMENT T{t} — heating to {temp}°C"

    # Select and prepare extruder
    _FILAMENT_SELECT_EXTRUDER T={t}

    G90

    # Heat, wait, then clean at temperature
    M109.1 S{temp} T{t}
    IMP_LOG MSG="T{t} at temperature — cleaning nozzle..."
    IMP_LOG MSG="T{t} ready — unloading"

    M83
    G92 E0

    # Phase 1: small purge to soften and clear nozzle
    IMP_LOG MSG="Pre-unload purge {purge_before}mm"
    G1.1 E{purge_before} F{purge_speed}
    M400

    # Phase 2: slow retract to detach filament from hotend
    G1.1 E-15 F{retract_slow}
    M400

    # Phase 3: fast extraction out of coldend
    G1.1 E-{unload_len} F{retract_fast}
    M400

    G92 E0

    # Turn off heater
    M104.1 S0 T{t}

    IMP_LOG MSG="UNLOAD T{t} done — remove filament"


########################################
# PER-HEAD SHORTCUTS
########################################

[gcode_macro LOAD_T0]
description: Load filament into T0. Usage: LOAD_T0 [TEMP=230] [LENGTH=60] [PURGE=30]
gcode:
    _LOAD_FILAMENT T=0 TEMP={params.TEMP|default(230)} {% if params.LENGTH is defined %}LENGTH={params.LENGTH}{% endif %} {% if params.PURGE is defined %}PURGE={params.PURGE}{% endif %}

[gcode_macro LOAD_T1]
description: Load filament into T1. Usage: LOAD_T1 [TEMP=230] [LENGTH=60] [PURGE=30]
gcode:
    _LOAD_FILAMENT T=1 TEMP={params.TEMP|default(230)} {% if params.LENGTH is defined %}LENGTH={params.LENGTH}{% endif %} {% if params.PURGE is defined %}PURGE={params.PURGE}{% endif %}

[gcode_macro UNLOAD_T0]
description: Unload filament from T0. Usage: UNLOAD_T0 [TEMP=230] [UNLOAD_LEN=80]
gcode:
    _UNLOAD_FILAMENT T=0 TEMP={params.TEMP|default(230)} {% if params.UNLOAD_LEN is defined %}UNLOAD_LEN={params.UNLOAD_LEN}{% endif %}

[gcode_macro UNLOAD_T1]
description: Unload filament from T1. Usage: UNLOAD_T1 [TEMP=230] [UNLOAD_LEN=80]
gcode:
    _UNLOAD_FILAMENT T=1 TEMP={params.TEMP|default(230)} {% if params.UNLOAD_LEN is defined %}UNLOAD_LEN={params.UNLOAD_LEN}{% endif %}
