########################################
# SINGLE-HEAD PURGE LINE
# T0 → X=132 to X=32  (100mm, left side)
# T1 → X=182 to X=282 (100mm, right side)
# At Z=0.3mm, at print temperature
########################################

[gcode_macro _PURGE_LINE_SINGLE]
description: Single-head purge line at print temperature
gcode:
    {% set extruder     = params.EXTRUDER|default('extruder') %}
    {% set is_t0        = (extruder == 'extruder') %}
    {% set x_min        = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max        = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off     = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x %}
    {% set t1_y_off     = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y %}
    {% set purge_z      = 0.3 %}
    {% set travel_speed = 150 * 60 %}
    {% set t_index      = 0 if is_t0 else 1 %}
    {% set temp         = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp if is_t0 else printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}

    # Purge line positions (100mm from start)
    {% set purge_start_x = 132.0 if is_t0 else 182.0 %}
    {% set purge_end_x   = 32.0  if is_t0 else 282.0 %}

    {% if temp <= 0 %}
        IMP_LOG MSG="Purge skipped — T{t_index} temperature not set"
    {% else %}
        IMP_LOG MSG="Purge T{t_index} — line at {temp}°C"

        # Activate correct head
        _IDEX_DECOUPLE
        {% if is_t0 %}
            SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
            ACTIVATE_EXTRUDER EXTRUDER=extruder
            SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        {% else %}
            SET_GCODE_OFFSET X={t1_x_off} Y={t1_y_off} Z={printer["gcode_macro Z_OFFSET"].t1}
            ACTIVATE_EXTRUDER EXTRUDER=extruder1
            SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        {% endif %}
        G92 E0
        G90

        # Move to purge line start
        G1.1 Z5 F600
        G1.1 X{purge_start_x} Y0 F{travel_speed}
        G1.1 Z{purge_z} F240

        # Purge line
        M83
        G92 E0
        G1.1 E5 F200
        G92 E0
        G1.1 X{purge_end_x} E19 F600
        G92 E0

        # Retract and clear
        {% set retract = printer.configfile.settings.firmware_retraction.retract_length|default(1.0)|float %}
        G1.1 E-{retract} F200
        G92 E0
        G1.1 Z5 F600
        G1.1 Y20 F{travel_speed}

        # Wipe nozzle then park on silicone pad
        _WIPE_NOZZLE T={t_index}
        {% if is_t0 %}
            G1.1 X{x_min} F{travel_speed}
        {% else %}
            G1.1 X{x_max - t1_x_off} F{travel_speed}
        {% endif %}

        DBG_LOG MSG="Purge T{t_index} done"
    {% endif %}

########################################
# DUAL PURGE LINE — MIRROR MODE
# T0 → X=132 to X=32  (100mm, left side)
# T1 → automatic mirror (100mm, right side)
# At Z=0.3mm, print temperature
# After purge: park T0 left / T1 right / T0 active
########################################

[gcode_macro _PURGE_LINE]
description: Dual MIRROR purge line - T0 and T1 simultaneously at print temperature
gcode:
    {% set x_min        = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max        = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off     = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x %}
    {% set t1_y_off     = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y %}
    {% set purge_z      = 0.3 %}
    {% set travel_speed = 150 * 60 %}
    {% set t0_temp      = printer["gcode_macro _J1_RUNTIME_STATE"].left_temp %}
    {% set t1_temp      = printer["gcode_macro _J1_RUNTIME_STATE"].right_temp %}

    # T0 purge line positions — 100mm from start (T1 follows in mirror automatically)
    {% set purge_start_x = 132.0 %}
    {% set purge_end_x   = 32.0 %}

    IMP_LOG MSG="MIRROR purge — T0={t0_temp}°C T1={t1_temp}°C"

    # ── Set up MIRROR mode ─────────────────────────────────────────────────
    _IDEX_DECOUPLE
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}

    # Position T1 at x_max BEFORE activating MIRROR (fixes symmetry axis)
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_max} F12000

    # Position T0 at x_min
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    G1.1 X{x_min} F12000
    G92 E0

    # Activate MIRROR
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    # ── Synchronized purge line ────────────────────────────────────────────
    G90
    G1.1 Z5 F600
    G1.1 X{purge_start_x} Y0 F{travel_speed}
    G1.1 Z{purge_z} F240

    M83
    G92 E0
    G1.1 E5 F200
    G92 E0
    G1.1 X{purge_end_x} E19 F600
    G92 E0


    # Retract and clear
    {% set retract = printer.configfile.settings.firmware_retraction.retract_length|default(1.0)|float %}
    G1.1 E-{retract} F200
    G92 E0
    G1.1 Z5 F600
    G1.1 Y20 F{travel_speed}

    DBG_LOG MSG="MIRROR purge done — parking both heads"

    # ── Decouple and park ──────────────────────────────────────────────────
    _IDEX_DECOUPLE

    # Wipe T0 then park left
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G92 E0
    G90
    _WIPE_NOZZLE T=0
    G1.1 X{x_min} F12000

    # Wipe T1 then park right
    SET_GCODE_OFFSET X={t1_x_off} Y={t1_y_off} Z={printer["gcode_macro Z_OFFSET"].t1}
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G92 E0
    _WIPE_NOZZLE T=1
    G1.1 X{x_max - t1_x_off} F12000

    # Return to T0 active ready to print
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G92 E0

    DBG_LOG MSG="Parking done — T0 active ready to print"
