[gcode_macro PID_BED]
gcode:

    {% set temp_bed = params.TEMP|default(60) %}
    PID_CALIBRATE HEATER=heater_bed TARGET={temp_bed}
    SAVE_CONFIG

[gcode_macro PID_EXTRUDER]
gcode:
    G28
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G1.1 X{printer.configfile.settings.stepper_x.position_min|float + 10} F3000
    {% set temp_extruder = params.TEMP|default(210) %}
    PID_CALIBRATE HEATER=extruder TARGET={temp_extruder}
    SAVE_CONFIG

[gcode_macro PID_EXTRUDER1]
gcode:
    G28
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G1.1 X{printer.configfile.settings.dual_carriage.position_max|float - 10} F3000
    {% set temp_extruder = params.TEMP|default(210) %}
    PID_CALIBRATE HEATER=extruder1 TARGET={temp_extruder}
    SAVE_CONFIG
