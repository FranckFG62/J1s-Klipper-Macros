[gcode_macro TEST_SPEED]
description: Safe speed/acceleration test for J1s IDEX.
# T0 is constrained to the left half of the bed, T1 to the right half.
# The inactive carriage is parked on its edge before the test.
#
# Usage: TEST_SPEED [SPEED=200] [ACCEL=3000] [ITERATIONS=5] [CARRIAGE=0] [BOUND=20]
#
# CARRIAGE=0 → test on T0 (left zone)
# CARRIAGE=1 → test on T1 (right zone)

gcode:
    {% set speed      = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    {% set accel      = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    {% set iterations = params.ITERATIONS|default(5)|int %}
    {% set carriage   = params.CARRIAGE|default(0)|int %}
    {% set bound      = params.BOUND|default(20)|int %}

    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    {% set smallpatternsize = 20 %}

    # ── Machine physical limits ───────────────────────────────────────────
    {% set x_global_min = printer.toolhead.axis_minimum.x|float %}
    {% set x_global_max = printer.toolhead.axis_maximum.x|float %}
    {% set y_global_min = printer.toolhead.axis_minimum.y|float %}
    {% set y_global_max = printer.toolhead.axis_maximum.y|float %}

    # ── Safe zone according to tested carriage ────────────────────────────
    # T0: full range EXCEPT safe_distance on the right side (T1 parked at x_max)
    # T1: full range EXCEPT safe_distance on the left side (T0 parked at x_min)
    {% set safe_gap = printer.configfile.settings.dual_carriage.safe_distance|float %}

    {% if carriage == 0 %}
        {% set x_zone_min = x_global_min + bound %}
        {% set x_zone_max = x_global_max - safe_gap - bound %}
    {% else %}
        {% set x_zone_min = x_global_min + safe_gap + bound %}
        {% set x_zone_max = x_global_max - bound %}
    {% endif %}

    {% set y_min = y_global_min + bound %}
    {% set y_max = y_global_max - bound %}

    # Zone center for small pattern
    {% set x_center     = (x_zone_min + x_zone_max) / 2 %}
    {% set y_center     = (y_min + y_max) / 2 %}
    {% set x_center_min = x_center - smallpatternsize / 2 %}
    {% set x_center_max = x_center + smallpatternsize / 2 %}
    {% set y_center_min = y_center - smallpatternsize / 2 %}
    {% set y_center_max = y_center + smallpatternsize / 2 %}

    { action_respond_info(
        "TEST_SPEED J1s — carriage=%d speed=%d accel=%d iter=%d zone_x=[%.1f, %.1f]"
        % (carriage, speed, accel, iterations, x_zone_min, x_zone_max)) }

    # ── Safe IDEX homing ─────────────────────────────────────────────────
    # 1. Reset offset + full homing — both carriages go to their endstops
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    M400
    G28
    # 2. Lower Z in absolute machine position via G1.1 (bypasses G1 override)
    #    Cannot use G0/G1 here as Z offset is not yet set
    #    G1.1 bypasses the G1 override and sends command directly to MCU
    G90
    G1.1 Z50 F600
    M400
    # 3. Park inactive carriage on its edge (safe X move at Z=50, offset=0)
    {% if carriage == 0 %}
        IMP_LOG MSG="TEST_SPEED T0 — activating T0, parking T1 to the right"
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G1.1 X{x_global_max} F{printer.toolhead.max_velocity * 60}
        M400
        # 4. Activate T0 — set correct Z offset BEFORE SAVE_GCODE_STATE
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G92 E0
    {% else %}
        IMP_LOG MSG="TEST_SPEED T1 — activating T1, parking T0 to the left"
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G1.1 X{x_global_min} F{printer.toolhead.max_velocity * 60}
        M400
        # 4. Activate T1 — set correct Z offset BEFORE SAVE_GCODE_STATE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
    {% endif %}

    # 5. SAVE_GCODE_STATE AFTER correct offset is set
    SAVE_GCODE_STATE NAME=TEST_SPEED

    # ── Read initial position (skip detection reference) ─────────────────
    # Move into safe zone THEN home Y only.
    # No G28 X to avoid moving inactive carriage.
    G90
    G0 X{x_zone_max - 5} Y{y_max - 5} F{30 * 60}
    M400
    G28 Y
    G0 X{x_zone_max - 1} Y{y_max - 1} F{30 * 60}
    G4 P1000
    GET_POSITION

    # Test start position
    G0 X{x_zone_min} Y{y_min} Z{bound + 10} F{speed * 60}

    # ── Apply velocity limits ─────────────────────────────────────────────
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    # ── Test loop ────────────────────────────────────────────────────────
    {% for i in range(iterations) %}

        # Large pattern — diagonals
        G0 X{x_zone_min} Y{y_min}  F{speed * 60}
        G0 X{x_zone_max} Y{y_max}  F{speed * 60}
        G0 X{x_zone_min} Y{y_min}  F{speed * 60}
        G0 X{x_zone_max} Y{y_min}  F{speed * 60}
        G0 X{x_zone_min} Y{y_max}  F{speed * 60}
        G0 X{x_zone_max} Y{y_min}  F{speed * 60}

        # Large pattern — rectangle
        G0 X{x_zone_min} Y{y_min}  F{speed * 60}
        G0 X{x_zone_min} Y{y_max}  F{speed * 60}
        G0 X{x_zone_max} Y{y_max}  F{speed * 60}
        G0 X{x_zone_max} Y{y_min}  F{speed * 60}

        # Small pattern — diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed * 60}
        G0 X{x_center_max} Y{y_center_max} F{speed * 60}
        G0 X{x_center_min} Y{y_center_min} F{speed * 60}
        G0 X{x_center_max} Y{y_center_min} F{speed * 60}
        G0 X{x_center_min} Y{y_center_max} F{speed * 60}
        G0 X{x_center_max} Y{y_center_min} F{speed * 60}

        # Small pattern — rectangle
        G0 X{x_center_min} Y{y_center_min} F{speed * 60}
        G0 X{x_center_min} Y{y_center_max} F{speed * 60}
        G0 X{x_center_max} Y{y_center_max} F{speed * 60}
        G0 X{x_center_max} Y{y_center_min} F{speed * 60}

    {% endfor %}

    # ── Restore original limits ───────────────────────────────────────────
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # ── Read final position (compare with initial position) ───────────────
    # Same logic: stay in safe zone, G28 Y only.
    M400
    G0 X{x_zone_max - 5} Y{y_max - 5} F{30 * 60}
    G28 Y
    G0 X{x_zone_max - 1} Y{y_max - 1} F{30 * 60}
    G4 P1000
    GET_POSITION

    RESTORE_GCODE_STATE NAME=TEST_SPEED
    IMP_LOG MSG="TEST_SPEED done — compare MCU positions before/after to detect skips"
