########################################
# PAUSE / RESUME
#
# PAUSE:
#   1. Decouple IDEX mode if COPY/MIRROR (saves mode)
#   2. Retract E-2mm to prevent oozing
#   3. Z hop +10mm (relative, capped at Z max)
#   4. Park active head 10mm from X edge
#   5. Maintain hotend + bed temperature
#
# RESUME:
#   1. Restore XY position and IDEX mode
#   2. Re-inject retracted filament (anti-blob)
#   3. Resume print
#
# Works in PRIMARY mode (T0 or T1) and COPY/MIRROR mode
########################################

[pause_resume]

[gcode_macro _PAUSE_STATE]
# Stores machine state at pause time for RESUME
variable_x:           0.0
variable_y:           0.0
variable_z:           0.0
variable_e:           0.0
variable_speed:    6000
variable_extruder:  'extruder'
variable_idex_mode: 'PRIMARY'
variable_t0_temp:     0.0
variable_t1_temp:     0.0
variable_fan_left:    0.0
variable_fan_right:   0.0
gcode:
    # no-op — state storage only


[gcode_macro PAUSE]
description: Pause print — retract, Z hop, park at X edge, maintain temperatures
rename_existing: PAUSE_BASE
gcode:
    {% set park_offset = 10 %}  # mm from parking X edge
    {% set retract_len = 2.0 %}  # mm of retraction at pause
    {% set z_hop       = 10 %}   # mm of relative Z hop
    {% set z_max       = printer.configfile.settings.stepper_z.position_max|float %}

    {% set current_ext  = printer.toolhead.extruder %}
    {% set is_t0        = (current_ext == 'extruder') %}
    {% set idex_mode    = printer.dual_carriage.carriage_1 %}

    # Save position and full state BEFORE any move
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=x          VALUE={printer.gcode_move.gcode_position.x}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=y          VALUE={printer.gcode_move.gcode_position.y}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=z          VALUE={printer.gcode_move.gcode_position.z}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=e          VALUE={printer.gcode_move.gcode_position.e}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=speed      VALUE={printer.gcode_move.speed}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=extruder   VALUE='"{current_ext}"'
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=idex_mode  VALUE='"{idex_mode}"'
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=t0_temp    VALUE={printer["gcode_macro _J1_RUNTIME_STATE"].left_temp}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=t1_temp    VALUE={printer["gcode_macro _J1_RUNTIME_STATE"].right_temp}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=fan_left   VALUE={printer["fan_generic left_part_fan"].speed}
    SET_GCODE_VARIABLE MACRO=_PAUSE_STATE VARIABLE=fan_right  VALUE={printer["fan_generic right_part_fan"].speed}

    {% set px = printer.gcode_move.gcode_position.x|round(1) %}
    {% set py = printer.gcode_move.gcode_position.y|round(1) %}
    {% set pz = printer.gcode_move.gcode_position.z|round(1) %}
    IMP_LOG MSG="PAUSE — mode={idex_mode} extruder={current_ext} pos=({px},{py},{pz})"

    # Decouple if in COPY/MIRROR mode before any move
    {% if idex_mode in ['COPY', 'MIRROR'] %}
        DBG_LOG MSG="Pause — decoupling mode {idex_mode}"
        _IDEX_DECOUPLE
    {% endif %}

    # Turn off layer fans (anti-blob during pause)
    SET_FAN_SPEED FAN=left_part_fan  SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0

    # Filament retract
    SAVE_GCODE_STATE NAME=_pause_retract
    G91
    G1.1 E-{retract_len} F300
    RESTORE_GCODE_STATE NAME=_pause_retract

    # Relative Z hop capped at Z max
    {% set z_safe = [printer.gcode_move.gcode_position.z + z_hop, z_max - 5] | min %}
    G90
    G1.1 Z{z_safe} F600

    # Park at X edge + 10mm offset according to active head
    {% if is_t0 %}
        {% set park_x = printer.configfile.settings.stepper_x.position_min + park_offset %}
        DBG_LOG MSG="Parking T0 at X={park_x}"
    {% else %}
        {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x %}
        {% set park_x = printer.configfile.settings.dual_carriage.position_max - t1_x_off - park_offset %}
        DBG_LOG MSG="Parking T1 at X={park_x}"
    {% endif %}
    G1.1 X{park_x} Y5 F12000

    # Maintain temperatures (hotend + bed)
    # Temperatures are already active — no need to modify them
    # Just ensure runtime state is consistent
    DBG_LOG MSG="Temperatures maintained — T0={printer['gcode_macro _J1_RUNTIME_STATE'].left_temp}°C T1={printer['gcode_macro _J1_RUNTIME_STATE'].right_temp}°C"

    # Call native Klipper PAUSE to block print
    PAUSE_BASE

    IMP_LOG MSG="Print paused — RESUME to continue"


[gcode_macro RESUME]
description: Resume print after a pause
rename_existing: RESUME_BASE
gcode:
    {% set state      = printer["gcode_macro _PAUSE_STATE"] %}
    {% set retract_len = 2.0 %}

    {% set sx = state.x|round(1) %}
    {% set sy = state.y|round(1) %}
    {% set sz = state.z|round(1) %}
    IMP_LOG MSG="RESUME — returning to ({sx},{sy},{sz}) mode={state.idex_mode}"

          # ── Re-arm filament sensor ──
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=triggered VALUE=0
    FILAMENT_RESET_COUNTERS
    M412 S1

    # FIX: restore IDEX mode FIRST, before filament re-injection
    # In COPY/MIRROR mode, if we re-inject before syncing E1,
    # only T0 recovers its 2mm — T1 has an extrusion lag on RESUME
    {% if state.idex_mode == 'COPY' %}
        DBG_LOG MSG="Restoring COPY mode"
        IDEX_COPY
    {% elif state.idex_mode == 'MIRROR' %}
        DBG_LOG MSG="Restoring MIRROR mode"
        IDEX_MIRROR
    {% endif %}

    # Re-inject retracted filament (T0+T1 synchronized if COPY/MIRROR)
    G91
    G1.1 E{retract_len} F300
    G90
    G92 E{state.e}

    # Restore layer fans
    SET_FAN_SPEED FAN=left_part_fan  SPEED={state.fan_left}
    SET_FAN_SPEED FAN=right_part_fan SPEED={state.fan_right}

    # Return to saved XY position
    G1.1 X{state.x} Y{state.y} F{state.speed}

    # Lower Z
    G1.1 Z{state.z} F600

    # Resume print
    RESUME_BASE

    IMP_LOG MSG="Print resumed"


[gcode_macro CANCEL_PRINT]
description: Cancel print
rename_existing: CANCEL_PRINT_BASE
gcode:
    IMP_LOG MSG="Cancelling print"
    CANCEL_PRINT_BASE
    _IDEX_DECOUPLE
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=left_part_fan  SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0
    G91
    G1.1 E-2 F300
    G90
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G28 Y Z
    # Park BOTH heads — T0 left, T1 right
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{printer.configfile.settings.dual_carriage.position_max} F12000
    # Return to T0 to leave machine in clean state
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    RESET_RUNTIME_STATE
    FILAMENT_STATUS
    M412 S0
    IMP_LOG MSG="Print cancelled"

########################################
# START / END PRINT
########################################

[gcode_macro START_PRINT]
description: Print start macro — heat, home, purge, select IDEX mode from plate name
gcode:
    {% set BED_TEMP    = params.BED_TEMP|default(60)|float %}
    {% set T0_TEMP     = params.T0_TEMP|default(0)|float %}
    {% set T1_TEMP     = params.T1_TEMP|default(0)|float %}
    {% set PLATE       = params.PLATE|default('')|string|lower %}
    {% set SPACING     = params.SPACING|default(165)|float %}
    {% set DENSITY_T0  = params.DENSITY_T0|default(1.24)|float %}
    {% set DENSITY_T1  = params.DENSITY_T1|default(1.24)|float %}

    # Print mode detection
    # In COPY/MIRROR mode, if T1_TEMP is not provided by slicer,
    # use T0_TEMP as fallback — avoids cold purge (min_extrude_temp)
    {% set T1_TEMP = T0_TEMP if (T1_TEMP == 0 and ('copy' in PLATE or 'mirror' in PLATE)) else T1_TEMP %}
    {% set use_t0 = (T0_TEMP > 0) %}
    {% set use_t1 = (T1_TEMP > 0) %}
    {% set DUAL   = (use_t0 and use_t1) or ('copy' in PLATE) or ('mirror' in PLATE) %}
    {% set BACKUP    = 'backup' in PLATE %}
    {% set BACKUP_T1 = 'backup_t1' in PLATE %}

    # Full reset
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Store target temperatures
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp  VALUE={T0_TEMP}
    SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={T1_TEMP}

    # Start bed heating only — heads heat after
    M104.1 S0 T0
    M104.1 S0 T1
    M140 S{BED_TEMP}

    # Full homing
    G28
    G90
    M83
    G92 E0

    # Move 10mm away from silicone pads before heating
    {% if use_t0 or DUAL %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        G1.1 X{printer.configfile.settings.stepper_x.position_min|float + 10} F3000
    {% endif %}
    {% if use_t1 or DUAL %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        G1.1 X{printer.configfile.settings.dual_carriage.position_max|float - 10} F3000
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    {% endif %}

    # Wait for bed — heads heat only once bed is at temperature
    M190 S{BED_TEMP}

    # Start head heating (bed reached)
    {% if use_t0 %}
        M104.1 S{T0_TEMP} T0
    {% endif %}
    {% if use_t1 %}
        M104.1 S{T1_TEMP} T1
    {% endif %}
    # In BACKUP mode, pre-heat backup extruder alongside primary
    {% if BACKUP and not BACKUP_T1 %}
        M104.1 S{T0_TEMP} T1
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=right_temp VALUE={T0_TEMP}
    {% elif BACKUP_T1 %}
        M104.1 S{T1_TEMP} T0
        SET_GCODE_VARIABLE MACRO=_J1_RUNTIME_STATE VARIABLE=left_temp VALUE={T1_TEMP}
    {% endif %}

    # Wait for heads — only those in use
    {% if use_t0 %}
        M109.1 S{T0_TEMP}
    {% endif %}
    {% if use_t1 %}
        M109.1 S{T1_TEMP} T1
    {% endif %}
    # In BACKUP mode, also wait for backup extruder
    {% if BACKUP and not BACKUP_T1 %}
        M109.1 S{T0_TEMP} T1
    {% elif BACKUP_T1 %}
        M109.1 S{T1_TEMP} T0
    {% endif %}

    # Nozzle wipe at temperature — 3 back-and-forth on silicone pad
    # Avoid T0/T1 AUTOPARK here (would trigger new temp wait)
    {% if use_t0 or DUAL %}
        # T0: already active after G28 — apply Z offset before wipe
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G92 E0
        _WIPE_NOZZLE T=0
    {% elif use_t1 %}
        # T1 only: explicit switch
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
        _WIPE_NOZZLE T=1
    {% endif %}
    {% if DUAL or (BACKUP and not BACKUP_T1) %}
        # DUAL / BACKUP T0-primary: wipe T1, return to T0
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
        _WIPE_NOZZLE T=1
        # Return to T0 active before purge
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G92 E0
    {% endif %}
    {% if BACKUP_T1 %}
        # BACKUP T1-primary: wipe T0 (backup), return to T1
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G92 E0
        _WIPE_NOZZLE T=0
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
    {% endif %}

    # Homing done
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=1

    # Adaptive purge
    {% if DUAL %}
        _PURGE_LINE
    {% elif BACKUP and not BACKUP_T1 %}
        # BACKUP T0-primary: purge primary T0, then backup T1, return to T0
        _PURGE_LINE_SINGLE EXTRUDER=extruder
        _PURGE_LINE_SINGLE EXTRUDER=extruder1
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
        G92 E0
    {% elif BACKUP_T1 %}
        # BACKUP T1-primary: purge primary T1, then backup T0, return to T1
        _PURGE_LINE_SINGLE EXTRUDER=extruder1
        _PURGE_LINE_SINGLE EXTRUDER=extruder
        _IDEX_DECOUPLE
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x} Y={printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y} Z={printer["gcode_macro Z_OFFSET"].t1}
        G92 E0
    {% elif use_t0 %}
        _PURGE_LINE_SINGLE EXTRUDER=extruder
    {% elif use_t1 %}
        _PURGE_LINE_SINGLE EXTRUDER=extruder1
    {% endif %}

    # IDEX mode selection
    {% if 'copy' in PLATE %}
        IMP_LOG MSG="COPY mode — plate={PLATE} spacing={SPACING}mm"
        IDEX_COPY SPACING={SPACING}
    {% elif 'mirror' in PLATE %}
        IMP_LOG MSG="MIRROR mode — plate={PLATE}"
        IDEX_MIRROR
    {% elif BACKUP_T1 %}
        IMP_LOG MSG="BACKUP mode — plate={PLATE} T1 primary T0 backup"
        T1 AUTOPARK=0
        IDEX_BACKUP BACKUP=0
    {% elif BACKUP %}
        IMP_LOG MSG="BACKUP mode — plate={PLATE} T0 primary T1 backup"
        T0 AUTOPARK=0
        IDEX_BACKUP BACKUP=1
    {% elif use_t0 %}
        IMP_LOG MSG="PRIMARY T0 mode — plate={PLATE}"
        T0 AUTOPARK=0
    {% elif use_t1 %}
        IMP_LOG MSG="PRIMARY T1 mode — plate={PLATE}"
        T1 AUTOPARK=0
    {% endif %}

    # Store filament densities (from slicer or default 1.24)
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=density_t0 VALUE={DENSITY_T0}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_VARS VARIABLE=density_t1 VALUE={DENSITY_T1}
    # Reset counters for each print
    FILAMENT_RESET_COUNTERS
    # Ensure sensor is enabled
    M412 S1

    IMP_LOG MSG="Print started — T0={T0_TEMP}°C T1={T1_TEMP}°C Bed={BED_TEMP}°C"

[gcode_macro END_PRINT]
gcode:
    _IDEX_DECOUPLE
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=left_part_fan SPEED=0
    SET_FAN_SPEED FAN=right_part_fan SPEED=0
    # Retract and Z hop before homing
    G91
    G1.1 E-2 F300
    G1.1 Z10 F600
    G90
    # Reset offset before home to avoid out-of-range
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    # Home Y and Z
    G28 Y Z
    # Park BOTH heads — T0 left, T1 right
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G1.1 X{printer.configfile.settings.stepper_x.position_min} F12000
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{printer.configfile.settings.dual_carriage.position_max} F12000
    # Return to T0 to leave machine in clean state
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    RESET_RUNTIME_STATE
    IMP_LOG MSG="Print finished"
    FILAMENT_STATUS
