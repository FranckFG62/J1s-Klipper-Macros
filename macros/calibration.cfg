########################################
# Z OFFSET CALIBRATION
#
# Full procedure:
#   1. CALIBRATE_Z_START  → home, heat T0, T1 parked right,
#                           T0 placed at bed center at Z=0
#                           Use TESTZ to adjust T0
#   2. CALIBRATE_Z_SAVE   → saves T0 offset for both heads,
#                           T0 parked left, T1 placed at center at same temp
#                           Adjust T1 mechanically via the adjustment screw
#   3. CALIBRATE_Z_END    → final save, park both heads
########################################

[gcode_macro CALIBRATE_Z_START]
description: Start Z calibration — home, heat T0, T1 parked, T0 at center
gcode:
    {% set TEMP = params.TEMP|default(200)|float %}
    {% set x_center = (printer.configfile.settings.stepper_x.position_max
                       + printer.configfile.settings.stepper_x.position_min) / 2 %}
    {% set y_center = (printer.configfile.settings.stepper_y.position_max
                       + printer.configfile.settings.stepper_y.position_min) / 2 %}
    {% set x_max     = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off  = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}

    IMP_LOG MSG="Z Calibration — starting"

    # Home if needed
    {% if 'xyz' not in printer.toolhead.homed_axes %}
    G28
    {% endif %}
    G90

    # Move Z to 50mm to allow nozzle cleaning during heating
    G1.1 Z50 F600

    # Park T1 to the right first — compensate T1 X offset
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G1.1 X{x_max - t1_x_off - 1} F12000

    # Wait for temperature then clean nozzle before calibration
    IMP_LOG MSG="T0 — heating to {TEMP}°C..."
    M109.1 S{TEMP}
    IMP_LOG MSG="T0 at temperature — cleaning nozzle..."
    _WIPE_NOZZLE T=0

    # Activate T0 and move to center
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_center} Y{y_center} F9000

    # Lower to bed for calibration
    G1.1 Z0 F600

    IMP_LOG MSG="T0 ready — use TESTZ to adjust Z offset"
    IMP_LOG MSG="Run CALIBRATE_Z_SAVE when T0 is set"

[gcode_macro CALIBRATE_Z_SAVE]
description: Save T0 offset for both heads, place T1 at center for mechanical adjustment
gcode:
    {% set x_min = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (printer.configfile.settings.stepper_x.position_max
                       + printer.configfile.settings.stepper_x.position_min) / 2 %}
    {% set y_center = (printer.configfile.settings.stepper_y.position_max
                       + printer.configfile.settings.stepper_y.position_min) / 2 %}

    # Retrieve current T0 Z offset from TESTZ
    {% set new_z = printer.gcode_move.homing_origin.z %}

    # Single reference offset — T1 leveled mechanically via adjustment screw
    SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={new_z}
    SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={new_z}
    SAVE_VARIABLE VARIABLE=z_offset_t0 VALUE={new_z}
    IMP_LOG MSG="Z offset {new_z} saved (T0=T1)"

    # Raise to Z=50mm and park T0 to the left
    G1.1 Z50 F600
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    G90
    G1.1 X{x_min} F12000

    # Heat T1 to the same calibration temperature as T0 (consistent thermal expansion)
    {% set cal_temp = printer["extruder"].target %}
    IMP_LOG MSG="T1 — heating to {cal_temp}°C..."
    M104.1 S{cal_temp} T1

    # Activate T1, wait for temperature, then wipe before mechanical adjustment
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z={new_z}
    G92 E0
    M109.1 S{cal_temp} T1
    IMP_LOG MSG="T1 at temperature — cleaning nozzle..."
    _WIPE_NOZZLE T=1

    # Move T1 to center for mechanical adjustment
    G1.1 X{x_center} Y{y_center} F9000

    # Lower to bed for mechanical adjustment
    G1.1 Z0 F600

    IMP_LOG MSG="T1 ready — adjust mechanically via the adjustment screw"
    IMP_LOG MSG="Run CALIBRATE_Z_END when T1 is set"

[gcode_macro CALIBRATE_Z_END]
description: Finalize calibration — save and park both heads
gcode:
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}

    # Raise
    G1.1 Z5 F600

    # Park T1 to the right
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0    # FIX — reset offset BEFORE move
    G92 E0                            # FIX
    G90
    G1.1 X{x_max - t1_x_off - 1} F12000

    # Park T0 to the left and set it active
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_min} F12000

    # Turn off heaters
    TURN_OFF_HEATERS
    G28
    IMP_LOG MSG="Z calibration done — offsets saved automatically"

[gcode_macro Z_SAVE]
description: Save current Z offset (persisted across restarts)
gcode:
    SAVE_VARIABLE VARIABLE=z_offset_t0 VALUE={printer["gcode_macro Z_OFFSET"].t0}
    IMP_LOG MSG="Z offset saved — {printer['gcode_macro Z_OFFSET'].t0}"

########################################
# NOZZLE CLEANING
# Places T0 slightly left of center and T1 slightly right
# without collision risk, heats both nozzles for manual cleaning
########################################

[gcode_macro NOZZLE_CLEAN]
description: Place both nozzles at bed center and heat for manual cleaning
gcode:
    {% set TEMP    = params.TEMP|default(220)|float %}
    {% set x_min   = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max   = printer.configfile.settings.dual_carriage.position_max %}
    {% set x_center = (x_max + x_min) / 2 %}
    {% set y_center = (printer.configfile.settings.stepper_y.position_max
                       + printer.configfile.settings.stepper_y.position_min) / 2 %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x %}
    {% set t1_y_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_y %}
    {% set gap     = 30 %}   # gap between both nozzles in mm — adjust if needed

    # Home if needed
    {% if 'xyz' not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    G90

    # Preheat both nozzles in parallel
    M104.1 S{TEMP} T0
    M104.1 S{TEMP} T1
    IMP_LOG MSG="Heating nozzles to {TEMP}°C..."

    # Decouple and position T0 slightly left of center
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_center - gap} Y0 F9000

    # Position T1 slightly right of center
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X={t1_x_off} Y={t1_y_off} Z={printer["gcode_macro Z_OFFSET"].t1}
    G92 E0
    G1.1 X{x_center + gap} Y0 F9000

    # Switch back to T0 active
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0

    # Wait for both nozzles to reach temperature
    M109.1 S{TEMP} T0
    M109.1 S{TEMP} T1

    IMP_LOG MSG="Nozzles at {TEMP}°C — ready for manual cleaning"
    IMP_LOG MSG="Run NOZZLE_CLEAN_END when done"

[gcode_macro NOZZLE_CLEAN_END]
description: End of cleaning — turn off nozzles and park both heads
gcode:
    {% set x_min    = printer.configfile.settings.stepper_x.position_min %}
    {% set x_max    = printer.configfile.settings.dual_carriage.position_max %}
    {% set t1_x_off = printer["gcode_macro _J1_CONFIG"].right_nozzle_adjust_x|abs %}
    {% set park_x   = x_max - t1_x_off - 1 %}

    TURN_OFF_HEATERS

    # Full offset reset BEFORE any decoupling
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0

    # Clean decoupling
    _IDEX_DECOUPLE

    # --- Park T1 to the right ---
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    G92 E0
    G90

    # DEBUG — print actual values
    DBG_LOG MSG="PARK T1: x_max={x_max} t1_x_off={t1_x_off} park_x={park_x}"
    DBG_LOG MSG="GCODE_OFFSET current: X={printer.gcode_move.homing_origin.x} Y={printer.gcode_move.homing_origin.y} Z={printer.gcode_move.homing_origin.z}"

    G1.1 X{park_x} F12000

    # --- Park T0 to the left ---
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={printer["gcode_macro Z_OFFSET"].t0}
    G92 E0
    G1.1 X{x_min} F12000

    # Home
    G28

    IMP_LOG MSG="Cleaning done — nozzles parked"

########################################
# BED SCREW ADJUSTMENT
#
# Sequence:
#   1. BED_SCREWS_START  → heat bed, home, head at paper thickness on screw 1
#   2. Adjust screw until paper resistance is felt
#   3. NEXT_SCREW        → move to next screw (repeat 2-3)
#   4. BED_SCREWS_END    → reset offset, park
########################################

[gcode_macro _BED_SCREWS_STATE]
# Stores current state of screw adjustment
variable_current_screw: 0
variable_paper_z:       0.1
gcode:
    # no-op — state storage only

[gcode_macro BED_SCREWS_START]
description: Bed screw adjustment — positions head at paper thickness at each screw
gcode:
    {% set z_off    = printer["gcode_macro Z_OFFSET"].t0 %}
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set PAPER_Z  = params.PAPER_Z|default(0.1)|float %}

    # Start bed heating
    M140 S{BED_TEMP}
    IMP_LOG MSG="BED SCREWS — heating bed to {BED_TEMP}°C..."

    # Homing
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=0
    G28
    SET_GCODE_VARIABLE MACRO=_HOMED VARIABLE=ready VALUE=1

    # Wait for bed temperature
    M190 S{BED_TEMP}

    # Activate T0 and apply Z offset
    _IDEX_DECOUPLE
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    SET_GCODE_OFFSET X=0 Y=0 Z={z_off}
    G92 E0
    G90

    # Initialize state and go to first screw
    SET_GCODE_VARIABLE MACRO=_BED_SCREWS_STATE VARIABLE=paper_z VALUE={PAPER_Z}
    SET_GCODE_VARIABLE MACRO=_BED_SCREWS_STATE VARIABLE=current_screw VALUE=1
    _BED_SCREW_GOTO

[gcode_macro _BED_SCREW_GOTO]
description: Move head to current screw at paper height
gcode:
    {% set state   = printer["gcode_macro _BED_SCREWS_STATE"] %}
    {% set screw   = state.current_screw %}
    {% set paper_z = state.paper_z %}
    {% set positions = [
        (176, 185, "rear center"),
        (62,  6,   "front left"),
        (292, 6,   "front right")
    ] %}

    {% if screw <= positions|length %}
        {% set pos = positions[screw - 1] %}
        G1.1 Z5 F600
        G1.1 X{pos[0]} Y{pos[1]} F9000
        G1.1 Z{paper_z} F300
        IMP_LOG MSG="Screw {screw}/{positions|length} — {pos[2]} ({pos[0]},{pos[1]}) — Adjust screw then call NEXT_SCREW"
    {% else %}
        G1.1 Z5 F600
        IMP_LOG MSG="All screws adjusted — call BED_SCREWS_END to finish"
    {% endif %}

[gcode_macro NEXT_SCREW]
description: Move to next screw in loop (BED_SCREWS_END to finish)
gcode:
    {% set current = printer["gcode_macro _BED_SCREWS_STATE"].current_screw %}
    {% set total   = 3 %}
    {% set next    = (current % total) + 1 %}
    SET_GCODE_VARIABLE MACRO=_BED_SCREWS_STATE VARIABLE=current_screw VALUE={next}
    _BED_SCREW_GOTO

[gcode_macro BED_SCREWS_END]
description: Finish screw adjustment — reset offset and park
gcode:
    G1.1 Z10 F600
    SET_GCODE_OFFSET X=0 Y=0 Z=0
    SET_GCODE_VARIABLE MACRO=_BED_SCREWS_STATE VARIABLE=current_screw VALUE=0

    # Home
    G28

    IMP_LOG MSG="Screw adjustment done"
