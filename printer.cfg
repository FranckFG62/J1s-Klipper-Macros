[include mainsail.cfg]
[include hardware/*.cfg]
[include macros/*.cfg]


[gcode_arcs]

[exclude_object]

[temperature_sensor Screen]
sensor_type: temperature_host
min_temp: 0
max_temp: 80

#####################################################################
# MCU COOLING (Sensor + Fan combined on PA2)
#####################################################################

[temperature_fan MCU_Management]
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F

# Targets & Limits
target_temp: 35.0
min_temp: 0
max_temp: 60

# Comment out the lines below if you are using the PIN for AUXILARY_FAN management.
pin: PC6
# Control logic
control: watermark
max_delta: 3.0

# Speed settings
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
min_speed: 0.15
max_speed: 1.0


#############################################################
# Auxiliary cooling FAN connection
# Replaces the enclosure FAN
# Allows independent management of the cooling FANs
##############################################################


#[fan_generic auxiliary_fan]
#pin: PC6 # 
#max_power: 1.0
#kick_start_time: 0.5

[firmware_retraction]
retract_length: 0.8          # mm of retraction
retract_speed: 30             # mm/s retraction speed
unretract_extra_length: 0     # extra mm on return
unretract_speed: 30           # mm/s return speed

[respond]

########################################
# VARIABLE PERSISTENCE
# Stores Z offsets across restarts
# File created automatically on first SAVE_VARIABLE
########################################
[save_variables]
filename: ~/printer_data/config/variables.cfg

[stepper_z]
position_endstop: 205
position_max: 205

########################################
# J1s CONFIGURATION
# Adjust right_nozzle_adjust_x/y after T1 XY calibration
########################################

[gcode_macro _J1_CONFIG]
variable_wipe_on_activate: False
variable_right_nozzle_adjust_x: -0.5
variable_right_nozzle_adjust_y: 0.6
gcode:
    # no-op
	
########################################
# Z OFFSET (T0 reference)
# T1 is leveled mechanically via the adjustment screw to match T0.
# A single offset is persisted (z_offset_t0) and applied to both heads at startup.
# The value below is the default for the very first boot.
########################################
[gcode_macro Z_OFFSET]
variable_t0: -8
variable_t1: -8
gcode:
    # T1 is always at the same level as T0 (mechanical adjustment via screw)
    # Single reference offset: z_offset_t0, applied to both heads
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        {% set z = printer.save_variables.variables.z_offset_t0 %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={z}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={z}
    {% endif %}
    IMP_LOG MSG="Z offset reloaded — T0=T1={printer['gcode_macro Z_OFFSET'].t0}"

[delayed_gcode _LOAD_Z_OFFSETS]
initial_duration: 1
gcode:
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        {% set z = printer.save_variables.variables.z_offset_t0 %}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t0 VALUE={z}
        SET_GCODE_VARIABLE MACRO=Z_OFFSET VARIABLE=t1 VALUE={z}
        IMP_LOG MSG="Z offset loaded from variables.cfg — T0=T1={z}"
    {% else %}
        # First boot — persist default value
        SAVE_VARIABLE VARIABLE=z_offset_t0 VALUE={printer["gcode_macro Z_OFFSET"].t0}
        IMP_LOG MSG="First boot — default Z offset saved ({printer['gcode_macro Z_OFFSET'].t0})"
    {% endif %}

