[include mainsail.cfg]
[include hardware/*.cfg]
[include macros/*.cfg]

########################################
# MCU / ENCLOSURE COOLING
#
# By default, pin PC6 drives the enclosure fan automatically based on the
# MCU temperature sensor (PA2). The fan speed is managed by Klipper using
# watermark control (target 35 °C, 15 %–100 % range).
#
# ALTERNATIVE — Auxiliary fan:
#   If you want to connect an independent fan to the PC6 connector instead
#   (e.g. a part cooler or external fan), comment out MCU_temp_fan and
#   uncomment MCU_aux_fan below. The MCU temperature will still be displayed
#   in Mainsail as a read-only sensor; fan speed is then controlled manually
#   via SET_FAN_SPEED FAN=aux_fan SPEED=<0.0-1.0> or the AUX_FAN macro.
########################################
# BTT MMB Cubic V1.0 — secondary MCU for auxiliary fans (uncomment to enable)
#[include Extras/MMB_cubic.cfg]

#[include Extras/MMB_aux_fan.cfg]   # Auxiliary fan on MMB Cubic FAN0 (gpio8)

# Input shaper (ADXL345 — FYSETC v1 USB module, uncomment to enable)
#[include Extras/adxl345_fysetc_v1.cfg]



[gcode_arcs]

[exclude_object]

[force_move]
enable_force_move: True

[idle_timeout]
timeout: 3600
gcode:


[temperature_sensor Screen]
sensor_type: temperature_host
min_temp: 0
max_temp: 80

[firmware_retraction]
retract_length: 0.8          # mm of retraction
retract_speed: 30             # mm/s retraction speed
unretract_extra_length: 0     # extra mm on return
unretract_speed: 30           # mm/s return speed

[respond]

########################################
# VARIABLE PERSISTENCE
# Stores Z offsets across restarts
# File created automatically on first SAVE_VARIABLE
########################################
[save_variables]
filename: ~/printer_data/config/variables.cfg

[stepper_z]
position_endstop: 205
position_max: 205

########################################
# J1s CONFIGURATION
# Adjust right_nozzle_adjust_x/y after T1 XY calibration
########################################

[gcode_macro _J1_CONFIG]
variable_wipe_on_activate: False
variable_right_nozzle_adjust_x: -0.5
variable_right_nozzle_adjust_y: 0.6
gcode:
    # no-op
	
########################################
# Z OFFSET (T0 reference)
# T1 is leveled mechanically via the adjustment screw to match T0.
# A single offset is persisted (z_offset_t0) and applied to both heads at startup.
# The value below is the default for the very first boot.
########################################
[gcode_macro _Z_OFFSET]
variable_t0: -8
variable_t1: -8
gcode:
    # T1 is always at the same level as T0 (mechanical adjustment via screw)
    # Single reference offset: z_offset_t0, applied to both heads
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        {% set z = printer.save_variables.variables.z_offset_t0 %}
        SET_GCODE_VARIABLE MACRO=_Z_OFFSET VARIABLE=t0 VALUE={z}
        SET_GCODE_VARIABLE MACRO=_Z_OFFSET VARIABLE=t1 VALUE={z}
    {% endif %}
    IMP_LOG MSG="Z offset reloaded — T0=T1={printer['gcode_macro Z_OFFSET'].t0}"

[delayed_gcode _LOAD_Z_OFFSETS]
initial_duration: 1
gcode:
    {% if printer.save_variables.variables.z_offset_t0 is defined %}
        {% set z = printer.save_variables.variables.z_offset_t0 %}
        SET_GCODE_VARIABLE MACRO=_Z_OFFSET VARIABLE=t0 VALUE={z}
        SET_GCODE_VARIABLE MACRO=_Z_OFFSET VARIABLE=t1 VALUE={z}
        IMP_LOG MSG="Z offset loaded from variables.cfg — T0=T1={z}"
    {% else %}
        # First boot — persist default value
        SAVE_VARIABLE VARIABLE=z_offset_t0 VALUE={printer["gcode_macro _Z_OFFSET"].t0}
        IMP_LOG MSG="First boot — default Z offset saved ({printer['gcode_macro _Z_OFFSET'].t0})"
    {% endif %}

