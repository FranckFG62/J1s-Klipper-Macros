#####################################################################
# MCU COOLING — Enclosure fan 
# Sensor: PA2 (EPCOS 100K NTC)
# Fan:    PC6
#
# PID control: fan speed ramps gradually from min_speed (15%) to
# max_speed (100%) as the enclosure temperature rises above target.
# Target: 45 °C — suitable for normal printing conditions.
#
####################################################################

[temperature_fan MCU_Management]
sensor_pin: PA2
sensor_type: EPCOS 100K B57560G104F

target_temp: 45.0
min_temp: 0
max_temp: 70

pin: PC6
control: pid
pid_Kp: 2.0
pid_Ki: 0.5
pid_Kd: 2.0

max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5
min_speed: 0.15
max_speed: 1.0
