#####################################################################
# MCU COOLING — Enclosure fan
# Sensor: PA2 (EPCOS 100K NTC)
# Fan:    PC6
#
# AUTO mode (default): fan ramps from 15 % to 100 % as temperature
# rises from 35 °C to 45 °C, off below 35 °C.
#
# MANUAL mode: direct speed control from Mainsail or gcode.
#
# USAGE:
#   MCU_FAN AUTO          → restore automatic temperature control
#   MCU_FAN SPEED=50      → force fan to 50 %
#   MCU_FAN SPEED=0       → force fan off
#   MCU_FAN SPEED=100     → force fan to 100 %
#####################################################################

[temperature_sensor MCU_temp]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA2
min_temp: 0
max_temp: 70

[fan_generic MCU_fan]
pin: PC6
max_power: 1.0
shutdown_speed: 1.0
kick_start_time: 0.5

########################################
# AUTO / MANUAL control macro
########################################

[gcode_macro MCU_FAN]
description: MCU fan — MCU_FAN AUTO | MCU_FAN SPEED=0-100
variable_mode: 'auto'
gcode:
    {% if params.SPEED is defined %}
        {% set s = [[params.SPEED | int, 0] | max, 100] | min %}
        SET_GCODE_VARIABLE MACRO=MCU_FAN VARIABLE=mode VALUE="'manual'"
        UPDATE_DELAYED_GCODE ID=_MCU_FAN_LOOP DURATION=0
        SET_FAN_SPEED FAN=MCU_fan SPEED={ s / 100.0 }
        IMP_LOG MSG="MCU fan: MANUAL { s }%"
    {% else %}
        SET_GCODE_VARIABLE MACRO=MCU_FAN VARIABLE=mode VALUE="'auto'"
        UPDATE_DELAYED_GCODE ID=_MCU_FAN_LOOP DURATION=1
        IMP_LOG MSG="MCU fan: AUTO"
    {% endif %}

########################################
# AUTO temperature loop (runs every 10 s)
########################################

[delayed_gcode _MCU_FAN_LOOP]
initial_duration: 1
gcode:
    {% set temp = printer['temperature_sensor MCU_temp'].temperature %}
    {% set t_low  = 35.0 %}
    {% set t_high = 45.0 %}
    {% set s_min  = 0.15 %}
    {% if temp <= t_low %}
        {% set speed = 0.0 %}
    {% elif temp >= t_high %}
        {% set speed = 1.0 %}
    {% else %}
        {% set speed = s_min + (1.0 - s_min) * (temp - t_low) / (t_high - t_low) %}
    {% endif %}
    SET_FAN_SPEED FAN=MCU_fan SPEED={ speed }
    UPDATE_DELAYED_GCODE ID=_MCU_FAN_LOOP DURATION=10
